version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: always
    volumes:
      - mongo-data:/data/db
    networks:
      - app-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 30s
      timeout: 10s
      retries: 5

  auth:
    build: ./backend
    restart: always
    networks:
      - app-net
    env_file: ./backend/.env
    environment:
      SERVICE: auth
      PORT: 3001
      MONGODB_URL: mongodb://mongo:27017/codesprout
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  content:
    build: ./backend
    restart: always
    networks:
      - app-net
    env_file: ./backend/.env
    environment:
      SERVICE: content
      PORT: 3002
      MONGODB_URL: mongodb://mongo:27017/codesprout
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  social:
    build: ./backend
    restart: always
    networks:
      - app-net
    env_file: ./backend/.env
    environment:
      SERVICE: social
      PORT: 3003
      MONGODB_URL: mongodb://mongo:27017/codesprout
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3003/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  execution:
    build: ./backend
    restart: always
    networks:
      - app-net
    env_file: ./backend/.env
    environment:
      SERVICE: execution
      PORT: 3004
      MONGODB_URL: mongodb://mongo:27017/codesprout
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3004/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  payment:
    build: ./backend
    restart: always
    networks:
      - app-net
    env_file: ./backend/.env
    environment:
      SERVICE: payment
      PORT: 3005
      MONGODB_URL: mongodb://mongo:27017/codesprout
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3005/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  gateway:
    build: ./backend
    restart: always
    networks:
      - app-net
    env_file: ./backend/.env
    environment:
      SERVICE: gateway
      PORT: 3000
      AUTH_SERVICE_URL: http://auth:3001
      CONTENT_SERVICE_URL: http://content:3002
      SOCIAL_SERVICE_URL: http://social:3003
      EXECUTION_SERVICE_URL: http://execution:3004
      PAYMENT_SERVICE_URL: http://payment:3005
      MONGODB_URL: mongodb://mongo:27017/codesprout
    depends_on:
      - auth
      - content
      - social
      - execution
      - payment
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
    networks:
      - app-net

volumes:
  mongo-data:

networks:
  app-net:
